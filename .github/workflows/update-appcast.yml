name: Update Appcast (Windows)

# Run this manually when the appcast_windows.xml needs to be updated for
# an already-existing release — e.g. when the appcast step in release.yml
# failed or was skipped.
#
# It reads the build number from the git tag and the installer file size
# from the GitHub Releases API, so no build artifacts are needed.
# The updated appcast is always pushed to main (where WinSparkle reads it).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to set as latest in the appcast (e.g. 1.0.12-dev.3)'
        required: true
      branch:
        description: 'Branch whose appcast to update (dev for pre-releases, main for stable)'
        required: false
        default: 'main'

jobs:
  update-appcast:
    name: Update appcast_windows.xml
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Build and write appcast entry
        run: |
          VERSION="${{ inputs.version }}"

          # Build number from the git tag's pubspec.yaml
          git fetch --tags
          BUILD_NUMBER=$(git show "refs/tags/v${VERSION}:apps/worklog_studio/pubspec.yaml" \
            | grep '^version:' \
            | sed 's/version: //' \
            | cut -d'+' -f2 \
            | tr -d '[:space:]')

          INSTALLER="worklog_studio_setup_${VERSION}.exe"
          URL="https://github.com/vavilov2212/wl-studio/releases/download/v${VERSION}/${INSTALLER}"

          # File size, release date, and body from GitHub API - no download needed
          RELEASE=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/vavilov2212/worklog_studio/releases/tags/v${VERSION}")

          SIZE=$(echo "$RELEASE" | jq '.assets[] | select(.name | test("setup")) | .size')
          PUBLISHED_AT=$(echo "$RELEASE" | jq -r '.published_at')
          DATE=$(date -d "$PUBLISHED_AT" -u +"%a, %d %b %Y %H:%M:%S GMT")
          RELEASE_BODY=$(echo "$RELEASE" | jq -r '.body')

          VERSION="$VERSION" BUILD_NUMBER="$BUILD_NUMBER" URL="$URL" \
          SIZE="$SIZE" DATE="$DATE" RELEASE_BODY="$RELEASE_BODY" \
          python3 - << 'PYEOF'
import os, html as h

version      = os.environ['VERSION']
build_number = os.environ['BUILD_NUMBER']
url          = os.environ['URL']
size         = os.environ['SIZE']
date         = os.environ['DATE']
body         = os.environ['RELEASE_BODY']

items = [h.escape(l.strip()[2:]) for l in body.splitlines() if l.strip().startswith('- ')]
items_html = '\n'.join(f'      <li>{item}</li>' for item in items)
release_notes_html = (
    '<style>'
    'body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;'
    'font-size:13px;padding:12px 16px;color:#1c1e21;background:#fff;margin:0}'
    'ul{margin:0;padding-left:18px}li{margin:3px 0;line-height:1.5}'
    '</style>'
    f'<ul>\n{items_html}\n    </ul>'
)

xml = f'''<?xml version="1.0" encoding="utf-8"?>
<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
<channel>
  <title>Worklog Studio Windows Updates</title>
  <link>https://github.com/vavilov2212/wl-studio</link>
  <description>Latest updates for Worklog Studio (Windows)</description>
  <language>en</language>
  <item>
    <title>Version {version}</title>
    <sparkle:releaseNotes><![CDATA[{release_notes_html}]]></sparkle:releaseNotes>
    <pubDate>{date}</pubDate>
    <sparkle:installerArguments>/VERYSILENT /NORESTART</sparkle:installerArguments>
    <enclosure
      url="{url}"
      sparkle:version="{build_number}"
      sparkle:shortVersionString="{version}"
      length="{size}"
      type="application/octet-stream"/>
  </item>
</channel>
</rss>'''

with open('apps/worklog_studio/release/appcast_windows.xml', 'w', encoding='utf-8') as f:
    f.write(xml)
PYEOF

          echo "Updated appcast: version=${VERSION} build=${BUILD_NUMBER} size=${SIZE}"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/worklog_studio/release/appcast_windows.xml
          git commit -m "release: update appcast_windows.xml for v${{ inputs.version }}"
          git push origin ${{ inputs.branch }}
