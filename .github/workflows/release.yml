name: Release

# ─────────────────────────────────────────────────────────────
# Triggers when apps/worklog_studio/pubspec.yaml version changes
# on main (stable release) or dev (pre-release).
# Can also be triggered manually from the GitHub Actions UI.
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'apps/worklog_studio/pubspec.yaml'
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 0: Run unit tests — both build jobs depend on this.
  # Tests run on ubuntu (pure-Dart, no platform code needed).
  # A single failure here aborts the entire pipeline before
  # any artifact is built or any tag is pushed.
  # ──────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Melos Bootstrap
        run: melos bootstrap

      - name: Build Runner — style system
        run: dart run build_runner build --delete-conflicting-outputs --force-jit --build-filter="packages/worklog_studio_style_system/**"

      - name: Build Runner — vector svg
        run: dart run build_runner build --delete-conflicting-outputs --force-jit --build-filter="packages/vector_svg/**"

      - name: Build Runner — app
        run: dart run build_runner build --delete-conflicting-outputs --force-jit --build-filter="apps/worklog_studio/**"

      - name: Run unit tests
        working-directory: apps/worklog_studio
        run: flutter test test/core/ test/feature/ --reporter expanded

  # ──────────────────────────────────────────────────────────
  # JOB 1: Parse version, guard against duplicate tags, create tag
  # ──────────────────────────────────────────────────────────
  tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    outputs:
      version:      ${{ steps.parse.outputs.version }}
      build_number: ${{ steps.parse.outputs.build_number }}
      tag:          ${{ steps.parse.outputs.tag }}
      prerelease:   ${{ steps.parse.outputs.prerelease }}
      tag_exists:   ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Parse version from pubspec.yaml
        id: parse
        run: |
          VERSION=$(grep '^version:' apps/worklog_studio/pubspec.yaml \
            | sed 's/version: //' \
            | cut -d'+' -f1 \
            | tr -d '[:space:]')
          TAG="v$VERSION"
          if [[ "$VERSION" == *"dev"* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          BUILD_NUMBER=$(grep '^version:' apps/worklog_studio/pubspec.yaml \
            | sed 's/version: //' \
            | cut -d'+' -f2 \
            | tr -d '[:space:]')
          echo "version=$VERSION"             >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER"   >> $GITHUB_OUTPUT
          echo "tag=$TAG"                     >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE"       >> $GITHUB_OUTPUT
          echo "Version: $VERSION | Tag: $TAG | Pre-release: $PRERELEASE"

      - name: Check if tag already exists
        id: check
        run: |
          git fetch --tags
          if git rev-parse "${{ steps.parse.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.parse.outputs.tag }} already exists — skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.parse.outputs.tag }} is new"
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.parse.outputs.tag }}"
          git push origin "${{ steps.parse.outputs.tag }}"

  # ──────────────────────────────────────────────────────────
  # JOB 2a: Build Windows binary
  # ──────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: [test, tag]
    if: needs.tag.outputs.tag_exists == 'false'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          cache: true

      - name: Print versions
        run: |
          dart --version
          flutter --version

      - name: Install Melos
        run: dart pub global activate melos

      - name: Melos Bootstrap
        run: melos bootstrap

      - name: Build Runner — style system
        run: dart run build_runner build --delete-conflicting-outputs --force-jit --build-filter="packages/worklog_studio_style_system/**"

      - name: Build Runner — vector svg
        run: dart run build_runner build --delete-conflicting-outputs --force-jit --build-filter="packages/vector_svg/**"

      - name: Build Runner — app
        run: dart run build_runner build --delete-conflicting-outputs --force-jit --build-filter="apps/worklog_studio/**"

      - name: Select app icon
        shell: pwsh
        working-directory: apps/worklog_studio
        run: tool/windows/select_app_icon.ps1 -Flavor ${{ needs.tag.outputs.prerelease == 'true' && 'dev' || 'prod' }}

      - name: Build Windows release
        working-directory: apps/worklog_studio
        run: flutter build windows --release

      - name: Package ZIP
        shell: pwsh
        run: |
          $version = "${{ needs.tag.outputs.version }}"
          $zipName = "worklog_studio_windows_$version.zip"
          Compress-Archive `
            -Path "apps/worklog_studio/build/windows/x64/runner/Release/*" `
            -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: ${{ env.ZIP_NAME }}
          retention-days: 1

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version   = "${{ needs.tag.outputs.version }}"
          $sourceDir = Resolve-Path "apps/worklog_studio/build/windows/x64/runner/Release"
          $issScript = "apps/worklog_studio/installer/worklog_studio.iss"
          $outputDir = New-Item -ItemType Directory -Force -Path "installer_output" |
                         Select-Object -ExpandProperty FullName
          iscc "/DAppVersion=$version" "/DSourceDir=$sourceDir" "/O$outputDir" $issScript
          echo "INSTALLER_NAME=worklog_studio_setup_$version.exe" |
            Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer_output/${{ env.INSTALLER_NAME }}
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # JOB 2b: Build macOS binary
  # ──────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    needs: [test, tag]
    if: needs.tag.outputs.tag_exists == 'false'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          cache: true

      - name: Print versions
        run: |
          dart --version
          flutter --version

      - name: Install Melos
        run: dart pub global activate melos

      - name: Melos Bootstrap
        run: melos bootstrap

      - name: Build Runner — style system
        run: dart run build_runner build --delete-conflicting-outputs --force-jit --build-filter="packages/worklog_studio_style_system/**"

      - name: Build Runner — vector svg
        run: dart run build_runner build --delete-conflicting-outputs --force-jit --build-filter="packages/vector_svg/**"

      - name: Build Runner — app
        run: dart run build_runner build --delete-conflicting-outputs --force-jit --build-filter="apps/worklog_studio/**"

      - name: Update CocoaPods repo
        run: pod repo update

      - name: Select app icon
        working-directory: apps/worklog_studio
        run: bash tool/macos/select_app_icon.sh ${{ needs.tag.outputs.prerelease == 'true' && 'dev' || 'prod' }}

      - name: Build macOS release
        working-directory: apps/worklog_studio
        run: flutter build macos --release

      - name: Package ZIP
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          ZIP_NAME="worklog_studio_macos_$VERSION.zip"
          zip -r "$ZIP_NAME" \
            "apps/worklog_studio/build/macos/Build/Products/Release/worklog_studio.app"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: ${{ env.ZIP_NAME }}
          retention-days: 1

  # ──────────────────────────────────────────────────────────
  # JOB 3: Publish GitHub Release (waits for both builds)
  # ──────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [tag, build-windows, build-macos]
    if: needs.tag.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release

      - name: Generate changelog
        run: |
          TAG="${{ needs.tag.outputs.tag }}"
          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"- %s" > changelog.md
          else
            git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" > changelog.md
          fi
          cat changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ needs.tag.outputs.tag }}
          name:       "Release ${{ needs.tag.outputs.version }}"
          body_path:  changelog.md
          files: |
            worklog_studio_windows_${{ needs.tag.outputs.version }}.zip
            worklog_studio_setup_${{ needs.tag.outputs.version }}.exe
            worklog_studio_macos_${{ needs.tag.outputs.version }}.zip
          draft:      false
          prerelease: ${{ needs.tag.outputs.prerelease }}

      - name: Update appcast_windows.xml
        run: |
          VERSION="${{ needs.tag.outputs.version }}"
          BUILD_NUMBER="${{ needs.tag.outputs.build_number }}"
          PRERELEASE="${{ needs.tag.outputs.prerelease }}"
          INSTALLER="worklog_studio_setup_${VERSION}.exe"
          SIZE=$(stat -c%s "$INSTALLER")
          URL="https://github.com/vavilov2212/wl-studio/releases/download/v${VERSION}/${INSTALLER}"
          DATE=$(date -u +"%a, %d %b %Y %H:%M:%S GMT")

          # Dev builds update the dev branch appcast; stable builds update main.
          if [ "$PRERELEASE" = "true" ]; then
            TARGET_BRANCH="dev"
          else
            TARGET_BRANCH="main"
          fi

          cat > apps/worklog_studio/release/appcast_windows.xml << APPCAST
<?xml version="1.0" encoding="utf-8"?>
<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
<channel>
  <title>Worklog Studio Windows Updates</title>
  <link>https://github.com/vavilov2212/wl-studio</link>
  <description>Latest updates for Worklog Studio (Windows)</description>
  <language>en</language>
  <item>
    <title>Version ${VERSION}</title>
    <sparkle:releaseNotesLink>https://github.com/vavilov2212/wl-studio/releases/tag/v${VERSION}</sparkle:releaseNotesLink>
    <pubDate>${DATE}</pubDate>
    <sparkle:installerArguments>/VERYSILENT /NORESTART</sparkle:installerArguments>
    <enclosure
      url="${URL}"
      sparkle:version="${BUILD_NUMBER}"
      sparkle:shortVersionString="${VERSION}"
      length="${SIZE}"
      type="application/octet-stream"/>
  </item>
</channel>
</rss>
APPCAST

          # Stash the written file, switch to the target branch, restore it,
          # then commit only that file (avoids accidentally pushing source changes).
          cp apps/worklog_studio/release/appcast_windows.xml /tmp/appcast_windows.xml
          git fetch origin "$TARGET_BRANCH"
          git checkout -b _appcast-update "origin/$TARGET_BRANCH"
          cp /tmp/appcast_windows.xml apps/worklog_studio/release/appcast_windows.xml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/worklog_studio/release/appcast_windows.xml
          git commit -m "release: update appcast_windows.xml for v${VERSION}"
          git push origin "HEAD:$TARGET_BRANCH"
